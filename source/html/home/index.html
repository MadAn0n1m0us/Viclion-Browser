<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <title>Home</title>
    <style id="theme"></style>
</head>
<body style="visibility:hidden">
    <div class="parent-container">
        <div class="container">
            <h1 class="text">Viclion</h1>
            <div class="search-container">
                <input class="search-bar" type="text" placeholder="Enter a search or URL">
                <div id="suggestionBox"></div>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        let backend = null;
        let webSearchController = null;

        const input = document.querySelector(".search-bar");
        const box = document.getElementById("suggestionBox");

        let debounce = null;

        function renderSuggestions(suggestions) {
            box.innerHTML = "";

            if (!suggestions || suggestions.length === 0) {
                box.style.display = "none";
                return;
            }

            suggestions.forEach(function(text) {
                const div = document.createElement("div");

                div.className = "suggestion-item";
                div.textContent = text;

                div.onclick = function() { 
                    input.value = text;
                    box.style.display = "none";
                    backend.setWebEngineViewUrl(text)
                };

                box.appendChild(div);
            });

            box.style.display = "block";
        }

        window.onload = function() {

            new QWebChannel(qt.webChannelTransport, function(channel) {
                    backend = channel.objects.backend;
                    webSearchController = channel.objects.webSearchController;

                    backend.getCssCurrentTheme().then(function(cssTheme) {
                        document.getElementById("theme").textContent = cssTheme;
                        document.body.style.visibility = "visible";
                    });

                    if (webSearchController.suggestionsChanged) {
                        webSearchController.suggestionsChanged.connect(function(suggestions) {
                            renderSuggestions(suggestions);
                        });
                    }

                    input.addEventListener("input", 
                        function() {
                            clearTimeout(debounce);

                            const text = input.value.trim();

                            if (!text) {
                                box.style.display = "none";
                                return;
                            }

                            debounce = setTimeout(function() {
                                    console.log("Search:",text);
                                    webSearchController.search(text);
                                },
                                
                                200
                            );
                        }
                    );

                    input.addEventListener("keydown", function(event) {
                        if (event.key !== "Enter")
                            return;

                        event.preventDefault();
                        const text = input.value.trim();

                        if (!text)
                            return;

                        box.style.display = "none";
                        backend.setWebEngineViewUrl(text);
                    });
                }
            );
        };
    </script>
</body>
</html>
