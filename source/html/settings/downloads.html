<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <title>Downloads</title>
</head>
<body>
    <h1>Downloads</h1>
    <div>
        <div>
            <label>Emplacement: </label>
            <label id="downloadPathLabel"></label>
            <button type="button">Modify</button>
        </div>
        <div>
            <label>Always ask where save files</label>
            <input type="checkbox" name="" id="">
        </div>
        <div>
            <label>Print downloads once they are done</label>
            <input type="checkbox" name="" id="">
        </div>
    </div>

    <script type="text/javascript">
        let backend = null;

        window.onload = function() {
            new QWebChannel(qt.webChannelTransport, function(channel) {
                backend = channel.objects.backend;
                backend.getCssCurrentTheme().then(function(cssTheme) {
                    document.getElementById("theme").textContent = cssTheme;
                });
                backend.getDownloadPath().then(function(path) {
                    document.getElementById("downloadPathLabel").innerText = path;
                });
            });
        };
    </script>
</body>
</html>
